# ROS 2 controller configuration for the mock-hardware simulation.
# Used by res/launch/minimal_mock_simulation.launch.py and the integration tests.
#
# The controller_manager runs at 200 Hz (the minimum allowed by
# CartesianImpedanceController's update_frequency parameter).

controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    CartesianImpedance_trajectory_controller:
      type: cartesian_impedance_controller/CartesianImpedanceController

CartesianImpedance_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7
    end_effector: tool0
    update_frequency: 500.0       # Hz; must be in [200, 1000]
    wrench_ee_frame: tool0
    delta_tau_max: 1.0
    filtering:
      nullspace_config: 0.1
      pose: 0.1
      stiffness: 0.1
      wrench: 0.1
    verbosity:
      state_msgs: true             # Publish controller_state — required by tests
      tf_frames: false
      verbose_print: false
